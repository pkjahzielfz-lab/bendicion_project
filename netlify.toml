[build]
  command = "pip install -r requirements.txt && python manage.py collectstatic --no-input"
  publish = "staticfiles"

[functions]
  # Aquí le decimos a Netlify que busque en tu nueva carpeta
  directory = "netlify/functions"
  included_files = ["**/*.py", "**/templates/**", "**/static/**"]

[functions.netlify_handler]
  handler = "netlify_handler.handler"
  runtime = "python3.x"

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/netlify_handler"
  status = 200